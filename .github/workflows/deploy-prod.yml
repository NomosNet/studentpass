name: Deploy Prod

# На VPS попадает только то, что в ветке prod
on:
  push:
    branches: [prod]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_PATH="${{ secrets.VPS_APP_PATH }}"
            cd "$APP_PATH"

            echo ">>> Sync prod branch"
            git fetch origin prod
            git checkout prod
            git reset --hard origin/prod

            echo ">>> Backend secrets"
            cd backend
            cp -f .env.production .env

            echo ">>> Nginx"
            NGINX_CONF="$APP_PATH/deploy/nginx/studentpass.conf"
            if [ ! -f /etc/letsencrypt/live/student-pass.ru/fullchain.pem ]; then
              NGINX_CONF="$APP_PATH/deploy/nginx/studentpass.http-only.conf"
              echo "SSL certs not found, using HTTP-only nginx config"
            fi
            cp "$NGINX_CONF" /etc/nginx/sites-available/studentpass
            rm -f /etc/nginx/sites-enabled/default
            ln -sf /etc/nginx/sites-available/studentpass /etc/nginx/sites-enabled/studentpass
            nginx -t
            systemctl reload nginx

            echo ">>> Backend"
            docker compose -f docker-compose.prod.yml --env-file .env up -d --build

            echo ">>> Frontend"
            cd ../frontend
            npm ci
            npm run build

            WEB_ROOT="/var/www/studentpass"
            if [ "$(id -u)" -eq 0 ]; then
              mkdir -p "$WEB_ROOT"
              rsync -a --delete dist/ "$WEB_ROOT/"
            else
              sudo mkdir -p "$WEB_ROOT"
              sudo rsync -a --delete dist/ "$WEB_ROOT/"
            fi

            echo ">>> Health check"
            sleep 8
            curl -fsS http://127.0.0.1:8080/api/v1/health
            echo ""
            echo "Deploy OK"
