services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: studentpass
      MYSQL_USER: studentpass
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-devpassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: StudentPass.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Server=mysql;Port=3306;Database=studentpass;User=studentpass;Password=${MYSQL_PASSWORD:-devpassword};
      Jwt__SecretKey: ${JWT_SECRET_KEY:-dev-secret-change-me-in-production-use-long-random-string}
      Jwt__Algorithm: ${JWT_ALGORITHM:-HS256}
      Jwt__AccessTokenMinutes: ${ACC_TOKEN_EXP_MIN:-60}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
