services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: studentpass
      MYSQL_USER: studentpass
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-devpassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      # На первом запуске MySQL поднимает временный сервер (без порта 3306).
      # Проверяем реальный порт и доступ к БД studentpass, иначе API стартует слишком рано.
      test: ["CMD-SHELL", "mysql -h127.0.0.1 -P3306 -ustudentpass -p$$MYSQL_PASSWORD -e 'SELECT 1' studentpass || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 40s

  api:
    build:
      context: .
      dockerfile: StudentPass.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Server=mysql;Port=3306;Database=studentpass;User=studentpass;Password=${MYSQL_PASSWORD:-devpassword};
      Jwt__SecretKey: ${JWT_SECRET_KEY:-dev-secret-change-me-in-production-use-long-random-string}
      Jwt__Algorithm: ${JWT_ALGORITHM:-HS256}
      Jwt__AccessTokenMinutes: ${ACC_TOKEN_EXP_MIN:-60}
      Smtp__Host: ${SMTP_HOST:-}
      Smtp__Port: ${SMTP_PORT:-587}
      Smtp__User: ${SMTP_USER:-}
      Smtp__Password: ${SMTP_PASSWORD:-}
      Smtp__From: ${SMTP_FROM:-}
      Smtp__UseSsl: ${SMTP_USE_SSL:-false}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
